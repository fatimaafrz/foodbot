<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>FoodBot</title>

<link rel="stylesheet" href="style.css">

<link rel="preconnect" href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;700&display=swap" rel="stylesheet">

</head>

<body>

<div class="container">

<header>

<div class="logo">

🍔 FoodBot

</div>

<div class="header-icons">

<button id="themeBtn">🌙</button>

<button id="clearBtn">🗑</button>

</div>

</header>

<div class="main">

<div class="chat-area">

    <div id="messages">

        <div class="bot-message">
    
            <p>👋 سلام، به <strong>FoodBot</strong> خوش اومدی.</p>
    
            <p style="margin-top:10px;">
                برای شروع سفارش روی دکمه زیر کلیک کن.
            </p>
    
            <div class="options">
                <button class="option-btn" onclick="startOrder()">
                    🍔 شروع سفارش
                </button>
            </div>
    
        </div>
    
    </div>

<div class="input-area">

<input

type="text"

id="userInput"

placeholder="پیام..."

>

<button id="sendBtn">

ارسال

</button>

</div>

</div>

<div class="cart">

<h2>

🛒 سبد خرید

</h2>

<div id="cartItems">

<p>سبد خرید خالی است.</p>

</div>

<div class="total">

جمع:

<span id="totalPrice">

0

</span>

تومان

</div>

</div>

</div>

</div>

<script src="script.js"></script>

</body>

</html>
